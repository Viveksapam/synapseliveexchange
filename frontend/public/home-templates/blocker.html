<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance</title>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      font-family: 'Crimson Text', serif;
      background-color: #f5f1e8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .maintenance-box {
      border: 1px solid #d4cfc5;
      padding: 4rem 3rem;
      max-width: 650px;
      width: 100%;
      text-align: center;
      background: transparent;
    }
    h1 {
      font-family: 'Crimson Text', serif;
      font-size: 3rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 1.2rem;
      color: #8b6f47;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .description {
      font-size: 1rem;
      color: #b8b0a0;
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }
    .return-btn {
      display: inline-block;
      padding: 14px 40px;
      background-color: #8b6f47;
      color: white;
      text-decoration: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .return-btn:hover {
      background-color: #6b5437;
    }
    @media (max-width: 600px) {
      .maintenance-box {
        padding: 2.5rem 1.5rem;
      }
      h1 {
        font-size: 2rem;
      }
      .subtitle {
        font-size: 1rem;
      }
      .description {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="maintenance-box">
    <h1>Under Maintenance</h1>
    <p class="subtitle">This page is temporarily unavailable while we make improvements.</p>
    <p class="description">We'll be back soon. In the meantime, explore other sections of Synapse LE.</p>
    <a href="/" class="return-btn">Return to Home</a>
  </div>
</body>
</html>
